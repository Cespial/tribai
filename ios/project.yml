name: SuperAppTributaria
options:
  bundleIdPrefix: co.tribai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "TribAI"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -Osize
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      STRIP_INSTALLED_PRODUCT: true

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: "2.4.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "8.40.0"

targets:
  SuperAppTributaria:
    type: application
    platform: iOS
    sources:
      - path: SuperAppTributaria
    resources:
      - path: SuperAppTributaria/Resources
      - path: SuperAppTributaria/Localization
    dependencies:
      - package: MarkdownUI
      - package: KeychainAccess
      - package: Sentry
      - target: SuperAppTributariaWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tribai.app
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: SuperAppTributaria/SuperAppTributaria.entitlements
        INFOPLIST_KEY_NSFaceIDUsageDescription: "TribAI usa Face ID para proteger tu informacion"
    entitlements:
      path: SuperAppTributaria/SuperAppTributaria.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: production

  SuperAppTributariaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SuperAppTributariaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tribai.app.tests
    dependencies:
      - target: SuperAppTributaria

  SuperAppTributariaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SuperAppTributariaUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tribai.app.uitests
    dependencies:
      - target: SuperAppTributaria

  SuperAppTributariaWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SuperAppTributariaWidget
    info:
      path: SuperAppTributariaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: co.tribai.app.widget
        CODE_SIGN_ENTITLEMENTS: SuperAppTributariaWidget/SuperAppTributariaWidget.entitlements

schemes:
  SuperAppTributaria:
    build:
      targets:
        SuperAppTributaria: all
        SuperAppTributariaTests: [test]
        SuperAppTributariaUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SuperAppTributariaTests
        - SuperAppTributariaUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
