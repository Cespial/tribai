name: SuperAppTributaria
options:
  bundleIdPrefix: com.superapp-tributaria
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "SuperApp Tributaria"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: "2.4.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  SuperAppTributaria:
    type: application
    platform: iOS
    sources:
      - path: SuperAppTributaria
    resources:
      - path: SuperAppTributaria/Resources
      - path: SuperAppTributaria/Localization
    dependencies:
      - package: MarkdownUI
      - package: KeychainAccess
      - target: SuperAppTributariaWidget
        embed: true
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: SuperAppTributaria/SuperAppTributaria.entitlements
        INFOPLIST_KEY_NSFaceIDUsageDescription: "SuperApp Tributaria usa Face ID para proteger tu informacion"
    entitlements:
      path: SuperAppTributaria/SuperAppTributaria.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default

  SuperAppTributariaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SuperAppTributariaTests
    dependencies:
      - target: SuperAppTributaria

  SuperAppTributariaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SuperAppTributariaUITests
    dependencies:
      - target: SuperAppTributaria

  SuperAppTributariaWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SuperAppTributariaWidget
    info:
      path: SuperAppTributariaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.superapp-tributaria.SuperAppTributaria.Widget

schemes:
  SuperAppTributaria:
    build:
      targets:
        SuperAppTributaria: all
        SuperAppTributariaTests: [test]
        SuperAppTributariaUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SuperAppTributariaTests
        - SuperAppTributariaUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
